name: ABG Pricing Intelligence Pipeline

on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create folders
        run: mkdir -p data logs

      - name: Run pipeline
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          OPENSKY_USERNAME:     ${{ secrets.OPENSKY_USERNAME }}
          OPENSKY_PASSWORD:     ${{ secrets.OPENSKY_PASSWORD }}
        run: python orchestrator.py --once

      - name: Save database to repo
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add data/pricing.db
          git commit -m "Update pricing database [skip ci]" || echo "No changes to commit"
          git push
