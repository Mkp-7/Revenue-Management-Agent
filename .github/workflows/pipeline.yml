name: ABG Pricing Intelligence Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database from cache
        uses: actions/cache@v4
        with:
          path: data/pricing.db
          key: pricing-db-${{ github.run_number }}
          restore-keys: pricing-db-

      - name: Create folders
        run: mkdir -p data logs

      - name: Run pipeline
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          OPENSKY_USERNAME:     ${{ secrets.OPENSKY_USERNAME }}
          OPENSKY_PASSWORD:     ${{ secrets.OPENSKY_PASSWORD }}
        run: python orchestrator.py --once

      - name: Upload database
        uses: actions/upload-artifact@v4
        with:
          name: pricing-db-${{ github.run_number }}
          path: data/pricing.db
          retention-days: 7

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: logs/
          retention-days: 3
